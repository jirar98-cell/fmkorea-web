<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>소재 피드</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #181818;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #5a5a5a;
      --accent: #3b82f6;
      --green: #22c55e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; gap: 10px;
      padding: 11px 20px;
      background: rgba(13,13,13,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
      white-space: nowrap;
    }

    .badge {
      font-size: 12px;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
    }
    .badge.green { color: var(--green); border-color: #1a3a24; background: #0d1f12; }

    .spacer { flex: 1; }

    .refresh-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 13px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      transition: background 0.12s, transform 0.08s;
    }
    .refresh-btn:hover { background: #222; }
    .refresh-btn:active { transform: scale(0.96); }
    .refresh-btn.loading .icon { display: inline-block; animation: spin 0.7s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Grid ─────────────────────────────────── */
    .grid {
      columns: 4 220px;
      column-gap: 10px;
      padding: 14px 16px 40px;
    }

    @media (max-width: 540px) {
      .grid { columns: 2 140px; column-gap: 8px; padding: 10px 10px 30px; }
    }

    /* ── Card ─────────────────────────────────── */
    .card {
      break-inside: avoid;
      margin-bottom: 10px;
      background: var(--surface);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      border-color: #3a3a3a;
    }

    .thumb-wrap {
      position: relative;
      width: 100%;
      background: #1a1a1a;
      overflow: hidden;
    }

    .thumb {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .skeleton {
      width: 100%;
      height: 150px;
      background: linear-gradient(90deg, #1a1a1a 0%, #242424 50%, #1a1a1a 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease infinite;
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }

    .card-body { padding: 9px 11px 11px; }

    .type-badge {
      display: inline-block;
      font-size: 10.5px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      margin-bottom: 5px;
      letter-spacing: 0.2px;
    }
    .type-humor { background: #2d2200; color: #fbbf24; }
    .type-info  { background: #0f1e38; color: #60a5fa; }

    .card-title {
      font-size: 13px;
      line-height: 1.45;
      font-weight: 500;
      color: #d8d8d8;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 5px;
    }

    /* ── State messages ──────────────────────── */
    .state-wrap {
      column-span: all;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid #2a2a2a;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 14px;
    }

    .state-wrap p { font-size: 14px; }
  </style>
</head>
<body>

<header class="header">
  <span class="logo">소재 피드</span>
  <span class="badge" id="cnt-badge">불러오는 중...</span>
  <span class="badge green" id="ai-badge" style="display:none">AI 필터링</span>
  <span class="spacer"></span>
  <button class="refresh-btn" id="refresh-btn" onclick="load(true)">
    <span class="icon">↻</span>
    <span>새로고침</span>
  </button>
</header>

<div class="grid" id="grid">
  <div class="state-wrap"><div class="spinner"></div><p>게시물 불러오는 중...</p></div>
</div>

<script>
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* IntersectionObserver로 뷰포트 근처 카드만 썸네일 요청 */
/* 동시 요청 수 제한 — 많으면 fmkorea 봇 탐지 */
let _thumbRunning = 0;
const THUMB_CONCURRENCY = 3;
const _thumbQueue = [];

function _drainThumb() {
  while (_thumbRunning < THUMB_CONCURRENCY && _thumbQueue.length > 0) {
    const { card, resolve } = _thumbQueue.shift();
    _thumbRunning++;
    _doLoadThumb(card).finally(() => {
      _thumbRunning--;
      resolve();
      _drainThumb();
    });
  }
}

async function _doLoadThumb(card) {
  const postUrl = card.dataset.url;
  const skel    = card.querySelector('.skeleton');
  const twrap   = card.querySelector('.thumb-wrap');
  if (!postUrl || !twrap) return;

  try {
    const res = await fetch(`/api/thumb?url=${encodeURIComponent(postUrl)}`);
    const d   = await res.json();
    if (!d.img) { card.remove(); return; }

    const img = document.createElement('img');
    img.className = 'thumb';
    img.alt = '';
    img.onload  = () => { if (skel) skel.remove(); twrap.appendChild(img); };
    img.onerror = () => { card.remove(); };
    img.src = d.img;
  } catch {
    card.remove();
  }
}

function loadThumb(card) {
  return new Promise(resolve => {
    _thumbQueue.push({ card, resolve });
    _drainThumb();
  });
}

const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (!e.isIntersecting) return;
    const card = e.target;
    io.unobserve(card);
    loadThumb(card);
  });
}, { rootMargin: '200px' });

function makeCard(post) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.url = post.url;
  card.onclick = () => window.open(post.url, '_blank');

  const typeLabel = post.content_type === 'info' ? '정보' : '유머';
  const typeClass = post.content_type === 'info' ? 'type-info' : 'type-humor';

  card.innerHTML = `
    <div class="thumb-wrap">
      <div class="skeleton"></div>
    </div>
    <div class="card-body">
      <span class="type-badge ${typeClass}">${typeLabel}</span>
      <div class="card-title">${esc(post.title)}</div>
      <div class="card-meta">${esc(post.date || '')}${post.views ? ' · ' + esc(post.views) : ''}</div>
    </div>
  `;

  io.observe(card);
  return card;
}

let loading = false;

async function load(force = false) {
  if (loading) return;
  loading = true;

  const btn  = document.getElementById('refresh-btn');
  const cnt  = document.getElementById('cnt-badge');
  const grid = document.getElementById('grid');

  btn.classList.add('loading');
  cnt.textContent = '불러오는 중...';
  grid.innerHTML = '<div class="state-wrap"><div class="spinner"></div><p>게시물 불러오는 중...</p></div>';

  try {
    const res  = await fetch(force ? '/api/humor?refresh=1' : '/api/humor');
    const data = await res.json();

    if (data.error) {
      grid.innerHTML = `<div class="state-wrap"><p>오류: ${esc(data.error)}</p></div>`;
      cnt.textContent = '오류';
      return;
    }

    const posts = data.posts || [];
    cnt.textContent = posts.length
      ? `${posts.length}개 · ${data.fetched_at}`
      : '0개';

    grid.innerHTML = '';

    if (!posts.length) {
      grid.innerHTML = '<div class="state-wrap"><p>표시할 게시물이 없습니다</p></div>';
      return;
    }

    const frag = document.createDocumentFragment();
    posts.forEach(p => frag.appendChild(makeCard(p)));
    grid.appendChild(frag);

  } catch (e) {
    grid.innerHTML = `<div class="state-wrap"><p>불러오기 실패: ${esc(e.message)}</p></div>`;
    cnt.textContent = '오류';
  } finally {
    btn.classList.remove('loading');
    loading = false;
  }
}

async function checkAI() {
  try {
    const r = await fetch('/api/score_available');
    const d = await r.json();
    document.getElementById('ai-badge').style.display = d.available ? '' : 'none';
  } catch {}
}

checkAI();
load();
</script>
</body>
</html>
