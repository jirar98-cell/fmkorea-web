<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>소재 피드</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #181818;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #5a5a5a;
      --accent: #3b82f6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 30;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px 0;
    }

    .logo { font-size: 15px; font-weight: 700; }

    .cnt-badge {
      font-size: 12px; color: var(--muted);
      padding: 2px 8px; border-radius: 20px;
      background: var(--surface); border: 1px solid var(--border);
    }

    .spacer { flex: 1; }

    .refresh-btn {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 5px 12px; border-radius: 6px;
      cursor: pointer; font-size: 12px;
      transition: background 0.12s;
    }
    .refresh-btn:hover { background: #222; }
    .refresh-btn.loading .icon { display: inline-block; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Category tabs ───────────────────────── */
    .cats {
      display: flex; gap: 4px;
      padding: 8px 16px 10px;
      overflow-x: auto;
      -ms-overflow-style: none; scrollbar-width: none;
    }
    .cats::-webkit-scrollbar { display: none; }

    .cat-btn {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 12.5px; font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      transition: all 0.12s;
      white-space: nowrap;
    }
    .cat-btn:hover { border-color: #555; color: var(--text); }
    .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Grid ─────────────────────────────────── */
    .grid {
      columns: 4 220px;
      column-gap: 10px;
      padding: 12px 16px 40px;
    }
    @media (max-width: 540px) {
      .grid { columns: 2 140px; column-gap: 8px; padding: 10px 10px 30px; }
    }

    /* ── Card ─────────────────────────────────── */
    .card {
      break-inside: avoid;
      margin-bottom: 10px;
      background: var(--surface);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }
    .card.hidden { display: none; }

    .thumb-wrap { width: 100%; background: #1a1a1a; overflow: hidden; }

    .thumb { width: 100%; display: block; object-fit: cover; }

    .skeleton {
      width: 100%; height: 148px;
      background: linear-gradient(90deg, #1a1a1a 0%, #232323 50%, #1a1a1a 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease infinite;
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }

    .card-body { padding: 9px 11px 10px; }

    .card-title {
      font-size: 13px; line-height: 1.45; font-weight: 500;
      color: #d8d8d8;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex; align-items: center; gap: 6px;
      margin-top: 6px; flex-wrap: wrap;
    }

    .cat-tag {
      font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 3px;
      letter-spacing: 0.2px;
    }
    .source-tag {
      font-size: 10px; color: var(--muted);
      padding: 2px 6px; border-radius: 3px;
      background: #1e1e1e; border: 1px solid #2e2e2e;
    }
    .rec {
      font-size: 11px; color: #e87070;
      margin-left: auto;
    }
    .date-text { font-size: 11px; color: var(--muted); }

    /* category colors */
    .cat-유머  { background:#2d2200; color:#fbbf24; }
    .cat-감동  { background:#0f2d1f; color:#4ade80; }
    .cat-드라마 { background:#2d0f1f; color:#f472b6; }
    .cat-영화  { background:#1a0f2d; color:#a78bfa; }
    .cat-스포츠 { background:#0f1e2d; color:#38bdf8; }
    .cat-정치  { background:#2d1a0f; color:#fb923c; }
    .cat-아이돌 { background:#2d0f2d; color:#e879f9; }

    /* ── State ─────────────────────────────────── */
    .state-wrap {
      column-span: all; text-align: center;
      padding: 70px 20px; color: var(--muted);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid #2a2a2a; border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 14px;
    }
    .state-wrap p { font-size: 14px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="logo">소재 피드</span>
    <span class="cnt-badge" id="cnt">로딩 중...</span>
    <span class="spacer"></span>
    <button class="refresh-btn" id="rfbtn" onclick="load(true)">
      <span class="icon">↻</span><span>새로고침</span>
    </button>
  </div>
  <div class="cats" id="cats">
    <button class="cat-btn active" data-cat="전체">전체</button>
    <button class="cat-btn" data-cat="유머">유머</button>
    <button class="cat-btn" data-cat="감동">감동</button>
    <button class="cat-btn" data-cat="드라마">드라마</button>
    <button class="cat-btn" data-cat="영화">영화</button>
    <button class="cat-btn" data-cat="스포츠">스포츠</button>
    <button class="cat-btn" data-cat="정치">정치</button>
    <button class="cat-btn" data-cat="아이돌">아이돌</button>
  </div>
</div>

<div class="grid" id="grid">
  <div class="state-wrap"><div class="spinner"></div><p>게시물 불러오는 중...</p></div>
</div>

<script>
function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── 썸네일 큐 (최대 3 동시) ─────────────────── */
let _running = 0;
const MAX = 3;
const _queue = [];

function _drain() {
  while (_running < MAX && _queue.length > 0) {
    const { card, resolve } = _queue.shift();
    _running++;
    _doThumb(card).finally(() => { _running--; resolve(); _drain(); });
  }
}

async function _doThumb(card) {
  const url   = card.dataset.url;
  const skel  = card.querySelector('.skeleton');
  const twrap = card.querySelector('.thumb-wrap');
  if (!url || !twrap) return;
  try {
    const r = await fetch(`/api/thumb?url=${encodeURIComponent(url)}`);
    const d = await r.json();
    if (!d.img) { twrap.remove(); return; }
    const img = document.createElement('img');
    img.className = 'thumb'; img.alt = '';
    img.onload  = () => { if (skel) skel.remove(); twrap.appendChild(img); };
    img.onerror = () => { twrap.remove(); };
    img.src = d.img;
  } catch { twrap.remove(); }
}

function loadThumb(card) {
  return new Promise(r => { _queue.push({ card, resolve: r }); _drain(); });
}

const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (!e.isIntersecting) return;
    io.unobserve(e.target);
    loadThumb(e.target);
  });
}, { rootMargin: '200px' });

/* ── 카테고리 필터 ─────────────────────────────── */
let _activeCat = '전체';

document.getElementById('cats').addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _activeCat = btn.dataset.cat;
  filterCards();
});

function filterCards() {
  document.querySelectorAll('.card').forEach(card => {
    const match = _activeCat === '전체' || card.dataset.cat === _activeCat;
    card.classList.toggle('hidden', !match);
  });
  updateCount();
}

function updateCount() {
  const visible = document.querySelectorAll('.card:not(.hidden)').length;
  document.getElementById('cnt').textContent = `${visible}개`;
}

/* ── 카드 생성 ──────────────────────────────── */
function makeCard(post) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.url = post.url;
  card.dataset.cat = post.category || '유머';
  card.onclick = () => window.open(post.url, '_blank');

  const cat    = post.category || '유머';
  const source = post.source   || '';
  const rec    = post.recommend ? `♥ ${post.recommend}` : '';
  const date   = post.date || '';

  card.innerHTML = `
    <div class="thumb-wrap"><div class="skeleton"></div></div>
    <div class="card-body">
      <div class="card-title">${esc(post.title)}</div>
      <div class="card-footer">
        <span class="cat-tag cat-${esc(cat)}">${esc(cat)}</span>
        ${source ? `<span class="source-tag">${esc(source)}</span>` : ''}
        ${date ? `<span class="date-text">${esc(date)}</span>` : ''}
        ${rec ? `<span class="rec">${esc(rec)}</span>` : ''}
      </div>
    </div>
  `;

  io.observe(card);
  return card;
}

/* ── 메인 로드 ──────────────────────────────── */
let _loading = false;

async function load(force = false) {
  if (_loading) return;
  _loading = true;
  const btn  = document.getElementById('rfbtn');
  const grid = document.getElementById('grid');
  btn.classList.add('loading');
  document.getElementById('cnt').textContent = '로딩 중...';
  grid.innerHTML = '<div class="state-wrap"><div class="spinner"></div><p>게시물 불러오는 중...</p></div>';

  try {
    const res  = await fetch(force ? '/api/feed?refresh=1' : '/api/feed');
    const data = await res.json();
    if (data.error) {
      grid.innerHTML = `<div class="state-wrap"><p>오류: ${esc(data.error)}</p></div>`;
      document.getElementById('cnt').textContent = '오류';
      return;
    }
    const posts = data.posts || [];
    grid.innerHTML = '';
    if (!posts.length) {
      grid.innerHTML = '<div class="state-wrap"><p>게시물이 없습니다</p></div>';
      document.getElementById('cnt').textContent = '0개';
      return;
    }
    const frag = document.createDocumentFragment();
    posts.forEach(p => frag.appendChild(makeCard(p)));
    grid.appendChild(frag);
    filterCards();
  } catch (e) {
    grid.innerHTML = `<div class="state-wrap"><p>불러오기 실패: ${esc(e.message)}</p></div>`;
  } finally {
    btn.classList.remove('loading');
    _loading = false;
  }
}

load();
</script>
</body>
</html>
